version: 2
updates:
  - package-ecosystem: "uv"
    cooldown:
      default-days: 7
    directory: "/"
    schedule:
      interval: monthly
    ignore:
      - dependency-name: "doplaydo/*"
      - dependency-name: "jupyter-book"

  - package-ecosystem: github-actions
    cooldown:
      default-days: 7
    directory: /
    schedule:
      interval: monthly
    ignore:
      - dependency-name: "doplaydo/*"
